<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Umum</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .calc-btn {
            /* Menggunakan CSS standar untuk menjamin posisi center yang presisi */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0;
            @apply text-xl font-semibold rounded-2xl bg-transparent transition-all hover:bg-slate-800/40 active:bg-slate-800/70 active:scale-95 cursor-default select-none;
            min-height: 64px;
        }
        .btn-sci {
            @apply text-sm text-emerald-500 hover:text-emerald-400 border border-slate-800/30 bg-slate-800/10;
            min-height: 48px;
        }
        
        .display-area {
            @apply bg-slate-950/50 border border-slate-800 rounded-3xl p-6 mb-6 text-right overflow-hidden;
            min-height: 120px;
            transition: all 0.3s ease;
        }
        .display-success {
            @apply border-emerald-500/50 bg-emerald-950/20;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        @keyframes resultPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .animate-result { animation: resultPulse 0.3s ease-in-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #10b981; }

        .page-exit {
            opacity: 0 !important;
            transform: scale(1.05) !important;
            filter: blur(10px);
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-start p-6">

    <div class="w-full max-w-md mt-8 space-y-6">
        <a href="index.html?mode=menu" id="btn-home-back" class="inline-flex items-center space-x-2 text-sm font-semibold text-slate-400 hover:text-emerald-400 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            <span>Kembali ke Beranda</span>
        </a>

        <header class="text-center">
            <h1 class="text-2xl font-bold text-white">Kalkulator Standar</h1>
            <p class="text-slate-500 text-sm">Alat hitung cepat untuk kebutuhan harian.</p>
        </header>

        <div class="bg-slate-800/20 border border-slate-800 p-4 rounded-[2rem] shadow-2xl backdrop-blur-sm relative overflow-hidden">
            <!-- Panel Mata Uang (Fitur Baru) -->
            <div id="currency-panel" class="absolute inset-0 bg-slate-900/95 z-20 -translate-x-full transition-transform duration-300 flex flex-col p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3 1.343 3 3-1.343 3-3 3m0-18c-1.657 0-3 1.343-3 3s1.343 3 3 3 3 1.343 3 3-1.343 3-3 3m0-18c-1.105 0-2 .895-2 2s.895 2 2 2 2-.895 2-2-.895-2-2-2m0 14c-1.105 0-2 .895-2 2s.895 2 2 2 2-.895 2-2-.895-2-2-2"/></svg>
                        Konversi Mata Uang
                    </h3>
                    <button onclick="toggleCurrency()" class="p-2 text-slate-400 hover:text-white transition-colors cursor-default">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="mb-4">
                    <label class="text-[10px] uppercase font-bold text-slate-500 mb-1 block">Pilih Mata Uang Asal (Input)</label>
                    <select id="base-currency" onchange="updateCurrencyList()" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-emerald-400 outline-none focus:border-emerald-500 transition-all">
                        <option value="IDR">Rupiah (IDR)</option>
                        <option value="USD">Dolar AS (USD)</option>
                        <option value="SGD">Dolar Singapura (SGD)</option>
                        <option value="INR">Rupee (INR)</option>
                        <option value="EUR">Euro (EUR)</option>
                        <option value="GBP">Poundsterling (GBP)</option>
                        <option value="MYR">Ringgit (MYR)</option>
                        <option value="THB">Baht (THB)</option>
                        <option value="CNY">Yuan (CNY)</option>
                        <option value="JPY">Yen (JPY)</option>
                        <option value="RUB">Rubel (RUB)</option>
                    </select>
                </div>
                <div id="currency-list" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar"></div>
            </div>

            <!-- Panel Riwayat (Saran Baru) -->
            <div id="history-panel" class="absolute inset-0 bg-slate-900/95 z-20 translate-x-full transition-transform duration-300 flex flex-col p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Riwayat
                    </h3>
                    <button onclick="toggleHistory()" class="p-2 text-slate-400 hover:text-white transition-colors cursor-default">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                    <!-- Item riwayat akan muncul di sini via JS -->
                </div>
                <button onclick="clearHistory()" class="mt-4 py-3 text-[10px] text-red-400 hover:text-red-300 font-bold uppercase tracking-widest transition-colors border-t border-slate-800 pt-4 cursor-default">
                    Hapus Semua Riwayat
                </button>
            </div>

            <div class="display-area">
                <div id="history" class="text-slate-500 text-sm h-6 mb-1 truncate"></div>
                <div id="display" class="text-4xl font-bold tracking-tight truncate">0</div>
            </div>

            <!-- Baris Kontrol Atas -->
            <div class="flex justify-between items-center px-1 mb-2">
                <div class="flex items-center gap-2">
                    <button onclick="toggleHistory()" class="text-slate-500 hover:text-emerald-500 transition-all p-1 cursor-default">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </button>
                    <button onclick="toggleCurrency()" class="text-slate-500 hover:text-emerald-500 transition-all p-1 cursor-default">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3 1.343 3 3-1.343 3-3 3m0-18c-1.657 0-3 1.343-3 3s1.343 3 3 3 3 1.343 3 3-1.343 3-3 3m0-18c-1.105 0-2 .895-2 2s.895 2 2 2 2-.895 2-2-.895-2-2-2m0 14c-1.105 0-2 .895-2 2s.895 2 2 2 2-.895 2-2-.895-2-2-2"/></svg>
                    </button>
                </div>
                <button onclick="toggleSci()" id="sci-toggle" class="flex items-center gap-1.5 text-[10px] font-bold tracking-widest uppercase text-slate-500 hover:text-emerald-500 transition-all cursor-default group">
                    <span>Mode Saintifik</span>
                    <div class="p-1 bg-slate-800/50 rounded-md group-hover:bg-emerald-500/10 transition-colors">
                        <svg id="sci-icon" class="w-3.5 h-3.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </button>
            </div>

            <!-- Scientific Function Row (Animated) -->
            <div id="sci-row" class="grid grid-cols-4 gap-2 overflow-hidden max-h-0 opacity-0 mb-0 pb-0 border-b border-transparent transition-all duration-500 ease-in-out">
                <div onclick="mathFunc('sin')" class="calc-btn btn-sci">SIN</div>
                <div onclick="mathFunc('cos')" class="calc-btn btn-sci">COS</div>
                <div onclick="mathFunc('tan')" class="calc-btn btn-sci">TAN</div>
                <div onclick="mathFunc('sqrt')" class="calc-btn btn-sci text-lg">√</div>
                <div onclick="mathFunc('log')" class="calc-btn btn-sci">LOG</div>
                <div onclick="mathFunc('ln')" class="calc-btn btn-sci">LN</div>
                <div onclick="mathFunc('sq')" class="calc-btn btn-sci">x²</div>
                <div onclick="mathFunc('pi')" class="calc-btn btn-sci text-lg">π</div>
            </div>

            <div id="main-grid" class="grid grid-cols-4 gap-3 transition-all duration-300 origin-top">
                <div onclick="clearAll()" class="calc-btn text-emerald-500 hover:text-emerald-400">C</div>
                <div onclick="appendOp('/')" class="calc-btn text-emerald-500 hover:text-emerald-400 text-3xl">÷</div>
                <div onclick="appendOp('*')" class="calc-btn text-emerald-500 hover:text-emerald-400 text-3xl">×</div>
                <div onclick="deleteLast()" class="calc-btn text-emerald-500 hover:text-emerald-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75L14.25 12m0 0l2.25 2.25M14.25 12l2.25-2.25M14.25 12L12 14.25m-2.58 4.92l-6.375-6.375a1.125 1.125 0 010-1.59L9.42 4.83c.211-.211.498-.33.796-.33H19.5a2.25 2.25 0 012.25 2.25v10.5a2.25 2.25 0 01-2.25 2.25h-9.284c-.298 0-.585-.119-.796-.33z"/>
                    </svg>
                </div>

                <div onclick="appendNum('7')" class="calc-btn text-white">7</div>
                <div onclick="appendNum('8')" class="calc-btn text-white">8</div>
                <div onclick="appendNum('9')" class="calc-btn text-white">9</div>
                <div onclick="appendOp('-')" class="calc-btn text-emerald-500 hover:text-emerald-400 text-3xl">−</div>

                <div onclick="appendNum('4')" class="calc-btn text-white">4</div>
                <div onclick="appendNum('5')" class="calc-btn text-white">5</div>
                <div onclick="appendNum('6')" class="calc-btn text-white">6</div>
                <div onclick="appendOp('+')" class="calc-btn text-emerald-500 hover:text-emerald-400 text-3xl">+</div>

                <div onclick="appendNum('1')" class="calc-btn text-white">1</div>
                <div onclick="appendNum('2')" class="calc-btn text-white">2</div>
                <div onclick="appendNum('3')" class="calc-btn text-white">3</div>
                <div onclick="calculate()" class="calc-btn bg-emerald-500 text-white hover:bg-emerald-600 row-span-2 h-full shadow-lg shadow-emerald-500/20 text-3xl">=</div>

                <div onclick="appendOp('%')" class="calc-btn text-white">%</div>
                <div onclick="appendNum('0')" class="calc-btn text-white">0</div>
                <div onclick="appendNum('.')" class="calc-btn text-white">.</div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let expression = '';
        let historyData = JSON.parse(localStorage.getItem('calc_history') || '[]');
        let exchangeRates = null;

        const displayEl = document.getElementById('display');
        const historyEl = document.getElementById('history');
        const historyList = document.getElementById('history-list');

        // Memuat status Mode Saintifik dari localStorage saat halaman dimuat
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('sci_mode') === 'open') {
                toggleSci();
            }
            autoCleanHistory();
        });

        // --- FITUR KEYBOARD SUPPORT (SARAN PRO) ---
        window.addEventListener('keydown', (e) => {
            // Angka dan Titik
            if (/[0-9.]/.test(e.key)) {
                appendNum(e.key);
            }
            // Operator
            else if (['+', '-', '*', '/', '%'].test(e.key)) {
                appendOp(e.key);
            }
            // Enter untuk Sama Dengan
            else if (e.key === 'Enter') {
                e.preventDefault();
                calculate();
            }
            // Backspace untuk Delete
            else if (e.key === 'Backspace') {
                deleteLast();
            }
            // Escape untuk Clear All
            else if (e.key === 'Escape') {
                clearAll();
            }
        });

        function updateDisplay() {
            // Format tampilan ribuan dengan titik (Masking)
            if (currentInput === 'Error' || currentInput === 'Infinity' || currentInput.includes('e')) {
                displayEl.innerText = currentInput;
            } else {
                const parts = currentInput.split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                displayEl.innerText = parts.join(','); // Indonesia menggunakan koma untuk desimal
            }
            historyEl.innerText = expression;
            // Auto update currency if panel open
            const currencyPanel = document.getElementById('currency-panel');
            if (currencyPanel && !currencyPanel.classList.contains('-translate-x-full')) {
                updateCurrencyList();
            }
        }

        function appendNum(num) {
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOp(op) {
            if (currentInput === 'Error' || currentInput === 'Infinity') clearAll();
            
            if (currentInput !== '0' || expression === '') {
                expression += currentInput + ' ' + op + ' ';
                currentInput = '0';
            } else {
                expression = expression.slice(0, -3) + ' ' + op + ' ';
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            expression = '';
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Fungsi Toggle Mode Saintifik
        function toggleSci() {
            const row = document.getElementById('sci-row');
            const grid = document.getElementById('main-grid');
            const icon = document.getElementById('sci-icon');
            const btn = document.getElementById('sci-toggle');

            const isOpen = row.classList.contains('max-h-48');

            if (isOpen) {
                // Tutup
                row.classList.remove('max-h-48', 'opacity-100', 'mb-4', 'pb-4', 'border-slate-800');
                row.classList.add('max-h-0', 'opacity-0', 'mb-0', 'pb-0', 'border-transparent');
                grid.classList.remove('scale-95', 'opacity-80');
                icon.classList.remove('rotate-180');
                btn.classList.remove('text-emerald-500');
                localStorage.setItem('sci_mode', 'closed');
            } else {
                // Buka
                row.classList.remove('max-h-0', 'opacity-0', 'mb-0', 'pb-0', 'border-transparent');
                row.classList.add('max-h-48', 'opacity-100', 'mb-4', 'pb-4', 'border-slate-800');
                grid.classList.add('scale-95', 'opacity-80');
                icon.classList.add('rotate-180');
                btn.classList.add('text-emerald-500');
                localStorage.setItem('sci_mode', 'open');
            }
        }

        // Logika Riwayat
        function toggleHistory() {
            const panel = document.getElementById('history-panel');
            const currPanel = document.getElementById('currency-panel');
            if (!currPanel.classList.contains('-translate-x-full')) currPanel.classList.add('-translate-x-full');

            panel.classList.toggle('translate-x-full');
            if (!panel.classList.contains('translate-x-full')) {
                renderHistory();
            }
        }

        // Logika Konversi Mata Uang (Real-time)
        async function fetchRates() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                exchangeRates = data.rates;
            } catch (e) { console.error("Kurs API Error:", e); }
        }
        fetchRates();

        function toggleCurrency() {
            const panel = document.getElementById('currency-panel');
            const histPanel = document.getElementById('history-panel');
            if (!histPanel.classList.contains('translate-x-full')) histPanel.classList.add('translate-x-full');

            panel.classList.toggle('-translate-x-full');
            if (!panel.classList.contains('-translate-x-full')) {
                updateCurrencyList();
            }
        }

        function updateCurrencyList() {
            const list = document.getElementById('currency-list');
            const base = document.getElementById('base-currency').value;
            const amount = parseFloat(currentInput) || 0;

            if (!exchangeRates) {
                list.innerHTML = '<p class="text-slate-500 text-xs text-center mt-10 italic">Mengambil data kurs terbaru...</p>';
                fetchRates().then(() => updateCurrencyList());
                return;
            }

            const currencies = [
                { code: 'IDR', name: 'Rupiah' }, { code: 'USD', name: 'Dolar AS' },
                { code: 'SGD', name: 'Dolar Singapura' }, { code: 'INR', name: 'Rupee' },
                { code: 'EUR', name: 'Euro' }, { code: 'GBP', name: 'Poundsterling' },
                { code: 'MYR', name: 'Ringgit' }, { code: 'THB', name: 'Baht' },
                { code: 'CNY', name: 'Yuan' }, { code: 'JPY', name: 'Yen' },
                { code: 'RUB', name: 'Rubel' }
            ];

            const baseRate = exchangeRates[base];
            list.innerHTML = currencies.filter(c => c.code !== base).map(c => {
                const result = amount * (1 / baseRate) * exchangeRates[c.code];
                const formattedResult = result.toLocaleString('id-ID', { maximumFractionDigits: 2 });
                return `
                    <div onclick="copyToClipboard('${formattedResult}', this)" class="bg-slate-800/40 p-3 rounded-xl border border-slate-700/50 hover:border-emerald-500/30 transition-all cursor-default relative group hover:scale-[1.02]">
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] text-slate-500 font-bold uppercase">${c.name}</span>
                                <span class="copy-status hidden text-[10px] text-emerald-400 font-bold uppercase tracking-wider">Tersalin!</span>
                            </div>
                            <span class="text-[10px] text-emerald-500 font-bold">${c.code}</span>
                        </div>
                        <div class="text-white font-bold text-lg">${formattedResult}</div>
                    </div>
                `;
            }).join('');
        }

        function saveToHistory(expr, res) {
            const entry = {
                id: Date.now(),
                expr: expr,
                res: res,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            historyData.unshift(entry);
            if (historyData.length > 20) historyData.pop(); 
            localStorage.setItem('calc_history', JSON.stringify(historyData));
        }

        function renderHistory() {
            if (historyData.length === 0) {
                historyList.innerHTML = '<p class="text-slate-500 text-sm text-center mt-10">Belum ada riwayat perhitungan.</p>';
                return;
            }
            historyList.innerHTML = historyData.map(item => `
                <div onclick="copyToClipboard('${item.res}', this)" class="bg-slate-800/40 p-3 rounded-xl border border-slate-700/50 hover:border-emerald-500/30 transition-all cursor-default relative group hover:scale-[1.02]">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-slate-500 font-bold">${item.time}</span>
                            <span class="copy-status hidden text-[10px] text-emerald-400 font-bold uppercase tracking-wider">Tersalin!</span>
                        </div>
                        <button onclick="event.stopPropagation(); deleteHistoryItem(${item.id})" class="opacity-0 group-hover:opacity-100 p-1 text-slate-500 hover:text-red-400 transition-all cursor-default">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="text-slate-400 text-xs truncate mb-1">${item.expr} =</div>
                    <div class="text-emerald-400 font-bold text-lg">${item.res}</div>
                </div>
            `).join('');
        }

        function autoCleanHistory() {
            const sevenDaysInMs = 7 * 24 * 60 * 60 * 1000;
            const now = Date.now();
            const originalLength = historyData.length;
            
            historyData = historyData.filter(item => (now - item.id) < sevenDaysInMs);
            
            if (historyData.length !== originalLength) {
                localStorage.setItem('calc_history', JSON.stringify(historyData));
            }
        }

        function deleteHistoryItem(id) {
            historyData = historyData.filter(item => item.id !== id);
            localStorage.setItem('calc_history', JSON.stringify(historyData));
            renderHistory();
        }

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const status = element.querySelector('.copy-status');
                status.classList.remove('hidden');
                setTimeout(() => {
                    status.classList.add('hidden');
                }, 1500);
            });
        }

        function clearHistory() {
            if (confirm('Hapus seluruh riwayat perhitungan?')) {
                historyData = [];
                localStorage.removeItem('calc_history');
                renderHistory();
            }
        }

        // Logika Fungsi Saintifik
        function mathFunc(func) {
            if (currentInput === 'Error' || currentInput === 'Infinity') return;
            let val = parseFloat(currentInput);
            let result;
            
            if (func === 'pi') {
                currentInput = Math.PI.toFixed(8).replace(/\.?0+$/, "");
                updateDisplay();
                return;
            }

            try {
                switch(func) {
                    case 'sin': result = Math.sin(val * Math.PI / 180); break; // Input dalam derajat
                    case 'cos': result = Math.cos(val * Math.PI / 180); break;
                    case 'tan': result = Math.tan(val * Math.PI / 180); break;
                    case 'log': result = Math.log10(val); break;
                    case 'ln': result = Math.log(val); break;
                    case 'sqrt': result = Math.sqrt(val); break;
                    case 'sq': result = Math.pow(val, 2); break;
                }
                
                if (isNaN(result) || !isFinite(result)) {
                    currentInput = "Error";
                } else {
                    currentInput = parseFloat(result.toFixed(8)).toString();
                }
                updateDisplay();
            } catch (e) {
                currentInput = "Error";
                updateDisplay();
            }
        }

        function calculate() {
            try {
                let finalExpr = expression + currentInput;
                let displayExpr = finalExpr;
                finalExpr = finalExpr.replace(/%/g, '/100');
                
                let result = new Function('return ' + finalExpr)();
                let formattedResult;
                
                if (!isFinite(result)) {
                    formattedResult = "Infinity";
                } else if (isNaN(result)) {
                    formattedResult = "Error";
                } else {
                    formattedResult = parseFloat(result.toFixed(8)).toString();
                }

                // Simpan ke riwayat jika ekspresi tidak kosong
                if (expression !== '') {
                    saveToHistory(displayExpr, formattedResult);
                }

                currentInput = formattedResult;
                
                expression = '';
                
                // Animasi Feedback (Saran Estetika)
                const displayArea = document.querySelector('.display-area');
                displayArea.classList.add('display-success', 'animate-result');
                updateDisplay();
                
                setTimeout(() => {
                    displayArea.classList.remove('display-success', 'animate-result');
                }, 500);

            } catch (e) {
                currentInput = "Error";
                expression = '';
                updateDisplay();
            }
        }

        document.getElementById('btn-home-back').addEventListener('click', function(e) {
            e.preventDefault();
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = 'index.html?mode=menu';
            }, 500);
        });
    </script>
</body>
</html>
