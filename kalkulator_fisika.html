<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Rumus Fisika Dinamis</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-exit {
            opacity: 0 !important;
            transform: scale(1.05) !important;
            filter: blur(10px);
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-start p-6">

    <!-- Container Utama -->
    <div class="w-full max-w-2xl mt-12 space-y-8">
        <!-- Home Button -->
        <a href="index.html?mode=menu" id="btn-home-back" class="inline-flex items-center space-x-2 text-sm font-semibold text-slate-400 hover:text-emerald-400 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            <span>Kembali ke Beranda</span>
        </a>
        
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
                Kalkulator Fisika Dinamis
            </h1>
            <p class="text-slate-500 max-w-md mx-auto text-sm sm:text-base">
                Cari rumus fisika yang kamu butuhkan. Isi variabel yang diketahui, dan sistem akan menghitung sisanya secara otomatis.
            </p>
        </header>

        <!-- Bagian 1: Search Bar -->
        <div class="relative max-w-md mx-auto">
            <div class="flex items-center bg-slate-800 rounded-xl shadow-xs border border-slate-700 focus-within:border-emerald-500 focus-within:ring-2 focus-within:ring-emerald-900 transition-all duration-200">
                <span class="pl-4 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input 
                    type="text" 
                    id="searchBar" 
                    placeholder="Cari rumus (Newton, Pascal, Archimedes, Hidrostatis)..." 
                    class="w-full py-3.5 px-3 text-white placeholder-slate-500 bg-transparent focus:outline-none text-sm sm:text-base"
                    autocomplete="off"
                >
            </div>
            
            <!-- Dropdown Hasil Pencarian -->
            <div id="searchSuggestions" class="absolute left-0 right-0 mt-2 bg-slate-800 rounded-xl shadow-lg border border-slate-700 hidden z-10 overflow-hidden divide-y divide-slate-700">
                <!-- Data suggestions akan di-render via JavaScript secara dinamis -->
            </div>
        </div>

        <!-- Bagian 2: Area Kalkulator Dinamis (Tersembunyi di awal) -->
        <main id="calculatorArea" class="bg-slate-800 rounded-2xl shadow-xs border border-slate-700 p-6 sm:p-8 space-y-6 hidden fade-in">
            <!-- Header Kartu Kalkulator -->
            <div class="border-b border-slate-700 pb-4">
                <h2 id="formulaTitle" class="text-xl font-bold text-white">Nama Rumus</h2>
                <p class="text-xs text-slate-400 mt-0.5">Rumus utama: <code id="formulaCode" class="font-mono bg-slate-900 px-1.5 py-0.5 rounded text-emerald-400 font-semibold">F = m × a</code></p>
            </div>

            <!-- Grid Form Input (Akan dibuat dinamis oleh JS berdasarkan rumus yang dipilih) -->
            <div id="inputsContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                <!-- Input fields di-inject di sini -->
            </div>

            <!-- Notifikasi Indikator Otomatis -->
            <div id="infoMessage" class="text-xs text-slate-400 flex items-center gap-1.5 bg-slate-900/50 px-3 py-2.5 rounded-lg border border-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="infoText">Masukkan nilai untuk menghitung otomatis. Kosongkan semua untuk reset.</span>
            </div>

            <!-- Area Langkah Pengerjaan (Saran Fungsionalitas) -->
            <div id="stepArea" class="hidden fade-in space-y-3 pt-4 border-t border-slate-700">
                <h4 class="text-xs font-bold text-emerald-500 uppercase tracking-widest">Langkah Pengerjaan:</h4>
                <div id="stepContent" class="font-mono text-sm text-slate-300 bg-slate-900/80 p-4 rounded-xl border border-emerald-900/30 leading-relaxed">
                </div>
            </div>
        </main>

    </div>

    <!-- Logika JavaScript -->
    <script>
        // --- KONFIGURASI SATUAN (Saran Nomer 4) ---
        const unitConfig = {
            force: { options: ['N', 'kN', 'mN'], factors: { 'N': 1, 'kN': 1000, 'mN': 0.001 } },
            mass: { options: ['kg', 'g', 'mg', 'ton'], factors: { 'kg': 1, 'g': 0.001, 'mg': 0.000001, 'ton': 1000 } },
            accel: { options: ['m/s²'], factors: { 'm/s²': 1 } },
            area: { options: ['m²', 'cm²', 'mm²'], factors: { 'm²': 1, 'cm²': 0.0001, 'mm²': 0.000001 } },
            density: { options: ['kg/m³', 'g/cm³'], factors: { 'kg/m³': 1, 'g/cm³': 1000 } },
            volume: { options: ['m³', 'L', 'cm³'], factors: { 'm³': 1, 'L': 0.001, 'cm³': 0.000001 } },
            pressure: { options: ['Pa', 'kPa', 'atm', 'bar'], factors: { 'Pa': 1, 'kPa': 1000, 'atm': 101325, 'bar': 100000 } },
            length: { options: ['m', 'cm', 'mm', 'km'], factors: { 'm': 1, 'cm': 0.01, 'mm': 0.001, 'km': 1000 } }
        };

        // --- DATABASE RUMUS FISIKA ---
        const formulaDatabase = {
            newton2: {
                title: "Hukum II Newton",
                category: "Dinamika Gerak",
                equation: "F = m × a",
                variables: [
                    { id: "F", label: "Gaya (F)", unitType: "force" },
                    { id: "m", label: "Massa (m)", unitType: "mass" },
                    { id: "a", label: "Percepatan (a)", unitType: "accel" }
                ],
                calculate: (vals) => {
                    if (vals.F === null) return vals.m * vals.a;
                    if (vals.m === null) return vals.a !== 0 ? vals.F / vals.a : 0;
                    if (vals.a === null) return vals.m !== 0 ? vals.F / vals.m : 0;
                }
            },
            pascal: {
                title: "Hukum Pascal",
                category: "Fluida Statis",
                equation: "F1 / A1 = F2 / A2",
                variables: [
                    { id: "F1", label: "Gaya Penampang 1 (F1)", unitType: "force" },
                    { id: "A1", label: "Luas Penampang 1 (A1)", unitType: "area" },
                    { id: "F2", label: "Gaya Penampang 2 (F2)", unitType: "force" },
                    { id: "A2", label: "Luas Penampang 2 (A2)", unitType: "area" }
                ],
                calculate: (vals) => {
                    if (vals.F1 === null) return (vals.F2 * vals.A1) / vals.A2;
                    if (vals.A1 === null) return vals.F2 !== 0 ? (vals.F1 * vals.A2) / vals.F2 : 0;
                    if (vals.F2 === null) return vals.A1 !== 0 ? (vals.F1 * vals.A2) / vals.A1 : 0;
                    if (vals.A2 === null) return vals.F1 !== 0 ? (vals.F2 * vals.A1) / vals.F1 : 0;
                }
            },
            archimedes: {
                title: "Hukum Archimedes",
                category: "Fluida Statis",
                equation: "Fa = ρ × g × Vbf",
                variables: [
                    { id: "Fa", label: "Gaya Apung (Fa)", unitType: "force" },
                    { id: "rho", label: "Massa Jenis Fluida (ρ)", unitType: "density" },
                    { id: "g", label: "Percepatan Gravitasi (g)", unitType: "accel" },
                    { id: "Vbf", label: "Volume Tercelup (Vbf)", unitType: "volume" }
                ],
                calculate: (vals) => {
                    if (vals.Fa === null) return vals.rho * vals.g * vals.Vbf;
                    if (vals.rho === null) return (vals.g * vals.Vbf) !== 0 ? vals.Fa / (vals.g * vals.Vbf) : 0;
                    if (vals.g === null) return (vals.rho * vals.Vbf) !== 0 ? vals.Fa / (vals.rho * vals.Vbf) : 0;
                    if (vals.Vbf === null) return (vals.rho * vals.g) !== 0 ? vals.Fa / (vals.rho * vals.g) : 0;
                }
            },
            hidrostatis: {
                title: "Tekanan Hidrostatis",
                category: "Fluida Statis",
                equation: "Ph = ρ × g × h",
                variables: [
                    { id: "Ph", label: "Tekanan Hidrostatis (Ph)", unitType: "pressure" },
                    { id: "rho", label: "Massa Jenis Zat Cair (ρ)", unitType: "density" },
                    { id: "g", label: "Percepatan Gravitasi (g)", unitType: "accel" },
                    { id: "h", label: "Kedalaman Zat Cair (h)", unitType: "length" }
                ],
                calculate: (vals) => {
                    if (vals.Ph === null) return vals.rho * vals.g * vals.h;
                    if (vals.rho === null) return (vals.g * vals.h) !== 0 ? vals.Ph / (vals.g * vals.h) : 0;
                    if (vals.g === null) return (vals.rho * vals.h) !== 0 ? vals.Ph / (vals.rho * vals.h) : 0;
                    if (vals.h === null) return (vals.rho * vals.g) !== 0 ? vals.Ph / (vals.rho * vals.g) : 0;
                }
            }
        };

        // DOM Elements
        const searchBar = document.getElementById('searchBar');
        const searchSuggestions = document.getElementById('searchSuggestions');
        const calculatorArea = document.getElementById('calculatorArea');
        const formulaTitle = document.getElementById('formulaTitle');
        const formulaCode = document.getElementById('formulaCode');
        const inputsContainer = document.getElementById('inputsContainer');
        const infoMessage = document.getElementById('infoMessage');
        const infoText = document.getElementById('infoText');
        const stepArea = document.getElementById('stepArea');

        let currentFormulaKey = null;
        let systemCalculatedInput = null;

        // --- LOGIKA SEARCH BAR ---
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            searchSuggestions.innerHTML = '';

            if (query === '') {
                searchSuggestions.classList.add('hidden');
                return;
            }

            let matches = false;
            for (const [key, data] of Object.entries(formulaDatabase)) {
                if (data.title.toLowerCase().includes(query) || 
                    data.equation.toLowerCase().includes(query) || 
                    data.category.toLowerCase().includes(query)) {
                    
                    matches = true;
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-4 py-3 hover:bg-slate-700 transition-colors flex justify-between items-center group text-sm sm:text-base";
                    btn.innerHTML = `
                        <div>
                            <span class="font-medium text-white block">${data.title}</span>
                            <span class="text-xs text-slate-500">${data.category}</span>
                        </div>
                        <span class="text-xs font-mono bg-slate-900 text-emerald-400 px-2.5 py-1 rounded-md font-bold group-hover:bg-emerald-900 transition-colors">
                            ${data.equation}
                        </span>
                    `;
                    btn.addEventListener('click', () => selectFormula(key));
                    searchSuggestions.appendChild(btn);
                }
            }

            if (matches) {
                searchSuggestions.classList.remove('hidden');
            } else {
                searchSuggestions.classList.add('hidden');
            }
        });

        // Menyembunyikan dropdown saat klik di luar area komponen search
        document.addEventListener('click', (e) => {
            if (!searchBar.contains(e.target) && !searchSuggestions.contains(e.target)) {
                searchSuggestions.classList.add('hidden');
            }
        });

        // --- AKTIVASI FORMULA YANG DIPILIH ---
        function selectFormula(key) {
            currentFormulaKey = key;
            const formula = formulaDatabase[key];
            
            searchBar.value = `${formula.title} (${formula.equation})`;
            searchSuggestions.classList.add('hidden');
            
            formulaTitle.textContent = formula.title;
            formulaCode.textContent = formula.equation;
            
            // Re-render grid layout kolom berdasarkan jumlah variabel rumus (3 atau 4 kolom)
            inputsContainer.className = `grid grid-cols-1 sm:grid-cols-${formula.variables.length} gap-5`;
            inputsContainer.innerHTML = '';

            // Inject element input ke DOM secara dinamis
            formula.variables.forEach(v => {
                const config = unitConfig[v.unitType];
                const optionsHtml = config.options.map(opt => `<option value="${opt}">${opt}</option>`).join('');

                const div = document.createElement('div');
                div.className = "space-y-1.5";
                div.innerHTML = `
                    <label for="input_${v.id}" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">
                        ${v.label}
                    </label>
                    <div class="relative flex items-center">
                        <input 
                            type="text" 
                            id="input_${v.id}" 
                            data-id="${v.id}"
                            placeholder="0" 
                            class="physics-input w-full px-3.5 py-3 bg-slate-700 border border-slate-600 rounded-xl text-white font-medium focus:outline-none focus:bg-slate-600 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-900 disabled:bg-slate-900 disabled:text-emerald-400 disabled:border-emerald-900 disabled:font-bold transition-all pr-20 text-sm sm:text-base"
                        >
                        <select id="unit_${v.id}" class="unit-selector absolute right-2 text-[10px] font-bold bg-slate-800/80 border-none text-emerald-400 focus:ring-0 cursor-pointer rounded-lg px-1 py-1">
                            ${optionsHtml}
                        </select>
                    </div>
                `;
                inputsContainer.appendChild(div);
            });

            // Pasang event listener ke element yang baru di-inject
            document.querySelectorAll('.physics-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const el = e.target;
                    let val = el.value.replace(/\./g, "");
                    if (!isNaN(val) && val !== "") {
                        const cursor = el.selectionStart;
                        const oldLen = el.value.length;
                        el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                        const newLen = el.value.length;
                        el.setSelectionRange(cursor + (newLen - oldLen), cursor + (newLen - oldLen));
                    }
                    handleCalculationLogic();
                });
            });
            
            document.querySelectorAll('.unit-selector').forEach(sel => {
                sel.addEventListener('change', () => {
                    if (systemCalculatedInput) {
                        systemCalculatedInput.value = '';
                        systemCalculatedInput.disabled = false;
                        systemCalculatedInput = null;
                    }
                    handleCalculationLogic();
                });
            });

            systemCalculatedInput = null;
            calculatorArea.classList.remove('hidden');
            updateInfoMessage(false, formula.variables.length);
            stepArea.classList.add('hidden');
        }

        // --- LOGIKA KALKULATOR DINAMIS UTAMA ---
        function handleCalculationLogic() {
            if (!currentFormulaKey) return;

            const formula = formulaDatabase[currentFormulaKey];
            const allInputs = Array.from(document.querySelectorAll('.physics-input'));
            
            // Dapatkan jumlah total variabel yang dibutuhkan rumus (misal: 3 untuk Newton, 4 untuk Pascal)
            const totalVariables = formula.variables.length;
            const requiredToCalculate = totalVariables - 1; // Syarat pemicu hitung (n-1)

            // Ambil input yang diisi user secara manual (abaikan field terkunci sistem)
            const userFilledInputs = allInputs.filter(input => input.value !== '' && !input.disabled);

            // KONDISI 1: Nilai terpenuhi (n-1) -> Hitung Otomatis Variabel Terakhir
            if (userFilledInputs.length === requiredToCalculate && !systemCalculatedInput) {
                const targetInput = allInputs.find(input => input.value === '');
                
                if (targetInput) {
                    // Petakan nilai input ke objek parameter
                    const valuesMap = {};
                    allInputs.forEach(input => {
                        const id = input.getAttribute('data-id');
                        valuesMap[id] = input.value !== '' ? parseFloat(input.value) : null;
                    });

                    // Panggil fungsi hitung dari database objek rumus
                    const result = formula.calculate(valuesMap);

                    targetInput.value = Number(result.toFixed(4));
                    targetInput.disabled = true;
                    systemCalculatedInput = targetInput;

                    showSteps(formula, valuesMap, targetId, targetInput.value, targetUnit);
                    updateInfoMessage(true, totalVariables);
                }
            } 
            // KONDISI 2: Pengguna menghapus salah satu angka dari mode kalkulasi aktif
            else if (userFilledInputs.length < requiredToCalculate && systemCalculatedInput) {
                systemCalculatedInput.value = '';
                systemCalculatedInput.disabled = false;
                systemCalculatedInput = null;
                stepArea.classList.add('hidden');

                updateInfoMessage(false, totalVariables);
            }
            // KONDISI 3: AUTO RESET TOTAL jika seluruh field manual dikosongkan pengguna
            else if (userFilledInputs.length === 0) {
                allInputs.forEach(input => {
                    input.value = '';
                    input.disabled = false;
                });
                systemCalculatedInput = null;
                stepArea.classList.add('hidden');
                updateInfoMessage(false, totalVariables);
            }
        }

        // --- MENAMPILKAN LANGKAH PENGERJAAN ---
        function showSteps(formula, valuesMap, targetId, resultVal, resultUnit) {
            const stepContent = document.getElementById('stepContent');
            let stepStr = `Rumus: ${formula.equation}<br>`;
            
            // Substitusi
            let substitution = formula.equation;
            formula.variables.forEach(v => {
                const val = v.id === targetId ? '?' : valuesMap[v.id];
                substitution = substitution.replace(v.id, `(${val})`);
            });
            
            stepStr += `Substitusi: ${substitution}<br>`;
            stepStr += `Hasil Akhir: <span class="text-emerald-400 font-bold">${resultVal} ${resultUnit}</span>`;
            
            stepContent.innerHTML = stepStr;
            stepArea.classList.remove('hidden');
        }

        // --- PANEL PESAN INDIKATOR ---
        function updateInfoMessage(isCalculated, totalVars) {
            const requiredCount = totalVars - 1;
            if (isCalculated) {
                infoMessage.className = "text-xs text-emerald-300 flex items-center gap-1.5 bg-emerald-900/40 px-3 py-2.5 rounded-lg border border-emerald-800";
                infoText.innerHTML = `Kalkulasi otomatis berhasil diterapkan pada variabel bertanda <strong>hijau</strong>.`;
            } else {
                infoMessage.className = "text-xs text-slate-400 flex items-center gap-1.5 bg-slate-900/50 px-3 py-2.5 rounded-lg border border-slate-700";
                infoText.innerHTML = `Masukkan nilai pada <strong>${requiredCount}</strong> kotak input untuk kalkulasi otomatis. Kosongkan semua untuk reset.`;
            }
        }

        // Animasi transisi saat kembali ke beranda
        document.getElementById('btn-home-back').addEventListener('click', function(e) {
            e.preventDefault();
            const target = this.getAttribute('href');
            document.body.classList.add('page-exit');
            
            setTimeout(() => {
                window.location.href = target;
            }, 500);
        });
    </script>
</body>
</html>
